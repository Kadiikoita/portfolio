<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Mon Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f7f9fc;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contact-container {
      background: #fff;
      width: 100%;
      max-width: 700px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .contact-container h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
      color: #111;
    }

    .contact-container p {
      text-align: center;
      margin-bottom: 30px;
      color: #666;
      line-height: 1.6;
    }

    .contact-form {
      display: grid;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-group textarea {
      min-height: 140px;
      resize: vertical;
    }

    .btn-submit {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn-submit:hover {
      background: #3730a3;
    }

    .contact-info {
      margin-top: 30px;
      text-align: center;
      color: #555;
      line-height: 1.8;
    }

    .contact-info a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: bold;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .contact-container {
        padding: 25px;
      }

      .contact-container h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <h1>Contactez-moi</h1>
    <p>
      je suis jeune
    </p>

    <form class="contact-form" action="#" method="post">
      <div class="form-group">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" placeholder="Kadissetou KOITA" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="koita.kadissetou@gmail.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Sujet</label>
        <input type="text" id="subject" name="subject" placeholder="Sujet du message" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Écrivez votre message ici..." required></textarea>
      </div>

      <button type="submit" class="btn-submit">Envoyer</button>
    </form>

    <div class="contact-info">
      <p>Email : <a href="mailto:tonemail@example.com">tonemail@example.com</a></p>
      <p>LinkedIn : <a href="#">Ton profil LinkedIn</a></p>
      <p>GitHub : <a href="#">Ton GitHub</a></p>
    </div>
  </div>

</body>
</html>
